<!DOCTYPE html>
<html>

<head>
    <title>Verificador Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: sans-serif; padding: 20px;">
    <h2>Verificando Supabase...</h2>
    <div id="output"></div>

    <script>
        const supabaseUrl = 'https://nyhkfbygpvujgembhhpb.supabase.co';
        const supabaseKey = 'sb_publishable_-Pk0YtIhD-x3ZmjvTCEDLQ_e-4ZF8rc';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function verify() {
            const out = document.getElementById('output');
            out.innerHTML = "Consultando banco de dados <code>prompts</code>...<br>";

            // Verificando Tabela Prompts
            const { data: dbData, error: dbError } = await supabaseClient.from('prompts').select('id').limit(5);

            if (dbError) {
                out.innerHTML += `<span style="color:red">Erro no Banco: ${dbError.message}</span><br>`;
            } else {
                out.innerHTML += `<span style="color:green">Banco OK! Primeiros IDs: ${dbData.length > 0 ? dbData.map(d => d.id).join(', ') : 'Vazio'}</span><br><br>`;
            }

            out.innerHTML += "Consultando storage bucket <code>images</code>...<br>";

            // Verificando pasta no Storage (Aumentando o limite padrão que é só de 100)
            const { data: storageData, error: storageError } = await supabaseClient.storage.from('images').list('', { limit: 1000 });

            if (storageError) {
                out.innerHTML += `<span style="color:red">Erro no Storage: ${storageError.message}</span><br>`;
            } else {
                out.innerHTML += `<span style="color:green">Storage OK! Existem ${storageData.length} arquivos guardados.</span><br>`;
            }
        }

        verify();
    </script>
</body>

</html>
